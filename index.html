<!DOCTYPE html>
<html>

<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ECG Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  height:100vh;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  background-image: url("images/bg1.jpg");
  background-size: cover;
  background-position: center;
}
  @media (max-width:768px){
  body{
    background-position: 40% center;
  
  }
}

/* LOGIN PAGE */

.loginPage{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGIN BOX */

.loginBox{
 width:290px;
  padding:40px;
  background: rgba(255,255,255,0.2); /* สีขาวโปร่ง */
  backdrop-filter: blur(10px); /* ทำให้พื้นหลังเบลอ */
  -webkit-backdrop-filter: blur(10px); /* สำหรับ Safari */
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  text-align:center;
  color:white;
  border:1px solid rgba(255,255,255,0.3); /* ขอบบางๆ */
}

.title{
  margin-bottom:20px;
}

.hello{
  display:inline-block;
  transform:translateX(-110px);
}

/* INPUT */

input{
  width:90%;
  padding:12px;
  margin:18px auto;
  border-radius:30px;
  border:none;
  outline:none;
  display:block;
}

/* BUTTON */

button{
  width:120px;
  padding:12px ;
  margin:10px auto;
  border-radius:30px;
  border:none;
  background:#3da5ff;
  color:white;
  font-size:16px;
  cursor:pointer;
  display:block;
  
}

button:hover{
  background:#1e90ff;
}

/* DASHBOARD */

#monitorContainer{
  display:flex;
  justify-content:center;
  gap:60px;
}

#bpmBox{
  font-size:90px;
  font-weight:bold;
}

#voltageBox{
  font-size:40px;
  color:red;
}

canvas{
  border:4px solid #3a9fec;
  margin-top:20px;
  width:90%;
  max-width:800px;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="loginPage">

<div class="loginBox">

<h2 class="title">
<span class="hello">Hello,</span><br>
Welcome to ECG Monitor
</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone Number">

<button onclick="loginUser()">Register now</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" style="display:none; text-align:center;">

<h2>ECG Monitor</h2>

<div id="monitorContainer">
<div id="bpmBox">-- BPM</div>
<div id="voltageBox">-- V</div>
</div>

<div id="status">Waiting for signal...</div>

<canvas id="rawChart"></canvas>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "ecg-708bf.firebaseapp.com",
  databaseURL: "https://ecg-708bf-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "ecg-708bf",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);


// LOGIN

window.loginUser = function(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

if(name==""||phone==""){
alert("กรุณากรอกข้อมูล");
return;
}

const id=Date.now();

set(ref(db,"users/"+id),{
name:name,
phone:phone,
loginTime:new Date().toLocaleString()
});

document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";

startMonitor();
}


// ECG MONITOR

let rawData=[];
let labels=[];
let lastBpm=0;

let rawChart;

function startMonitor(){

rawChart=new Chart(document.getElementById("rawChart"),{
type:"line",
data:{
labels:labels,
datasets:[{
data:rawData,
borderColor:"#00ff00",
borderWidth:2,
pointRadius:0
}]
},
options:{
animation:false,
scales:{
x:{display:false},
y:{display:false}
},
plugins:{
legend:{display:false}
}
}
});

function beep(){
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const oscillator=audioCtx.createOscillator();
const gainNode=audioCtx.createGain();

oscillator.frequency.value=1000;

oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);

oscillator.start();
gainNode.gain.setValueAtTime(1,audioCtx.currentTime);
gainNode.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);

oscillator.stop(audioCtx.currentTime+0.1);
}


// Firebase realtime

onValue(ref(db,"ECG"),(snapshot)=>{

const data=snapshot.val();

if(data){

labels.push("");
rawData.push(data.raw);

if(labels.length>80){
labels.shift();
rawData.shift();
}

rawChart.update();


// BPM

if(data.bpm!==undefined){

document.getElementById("bpmBox").innerHTML=data.bpm+" BPM";

if(data.bpm!==lastBpm&&data.bpm>0){
beep();
lastBpm=data.bpm;
}

let statusText="";
let statusColor="";

if(data.bpm<60){
statusText="LOW HEART RATE";
statusColor="orange";
}
else if(data.bpm>100){
statusText="HIGH HEART RATE";
statusColor="red";
}
else{
statusText="NORMAL";
statusColor="green";
}

const statusDiv=document.getElementById("status");
statusDiv.innerHTML=statusText;
statusDiv.style.color=statusColor;

}


// Voltage

if(data.voltage!==undefined){
document.getElementById("voltageBox").innerHTML=
data.voltage.toFixed(2)+" V";
}

}

});

}

</script>

</body>
</html>
