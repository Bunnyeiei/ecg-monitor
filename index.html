<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECG Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url("images/bg2.png");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }

    @media screen and (max-width:768px) {
      body { background-position: center; }
    }

    /* LOGIN PAGE */
    .loginPage {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loginBox {
      width: 290px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      color: rgb(203, 97, 97);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .title { margin-bottom: 20px; }
    .hello { display: inline-block; transform: translateX(-110px); }

    .menuPage {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-image: url("images/bg3.png");
      background-size: cover;
      background-position: center;
    }

    .menuPage button { width: 220px; padding: 14px; font-size: 18px; }

    .menubox {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 40px;
      padding: 40px;
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      background: rgba(255, 255, 255, 0.1);
      border: 3px solid rgb(255, 255, 255);
      border-radius: 30px;
    }

    /* MONITOR & HISTORY PAGE */
    .monitorPage {
      width: 100%;
      height: 100vh;
      display: flex;
      background-image: url("images/bg4.png");
      background-size: cover;
      background-position: center;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .monitorBox {
      padding: 20px;
      text-align: center;
      margin-top: 130px;
      width: 90%;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .backBtn {
      margin-left: 0;
      margin-right: auto;
      width: auto;
      padding: 8px 16px;
      margin-top: 30px;
      transform: translateX(30px);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 18px auto;
      border-radius: 30px;
      border: none;
      outline: none;
      display: block;
    }

    button {
      width: 120px;
      padding: 12px;
      margin: 10px auto;
      border-radius: 30px;
      border: none;
      background: #469cc4;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: block;
    }

    button:hover { background: #1e90ff; }

    #monitorContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 80px;
      margin: 25px auto;
      width: fit-content;
    }

    #bpmBox { font-size: 15px; font-weight: bold; color: #2d78c4; }
    #voltageBox { font-size: 15px; font-weight: bold; color: #ff4d4d; }
    #status { font-size: 15px; font-weight: bold; }

    /* แก้ไขจุดที่ 1: เปลี่ยนพื้นหลังของ Canvas เป็นสีขาวทึบ */
    canvas {
      display: block;
      background: #FFFFFF; /* พื้นหลังกราฟสีขาว */
      border: 4px solid #3073b6;
      margin: 20px auto;
      margin-top: 5px;
      width: 90%;
      max-width: 800px;
      border-radius: 15px; /* เพิ่มความมนให้ดูทันสมัย */
      box-shadow: 0 10px 30px rgba(0,0,0,0.2); /* เพิ่มเงาให้ตัวกราฟลอยขึ้นมา */
    }

    .summaryBox {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      color: #333;
    }
  </style>
</head>

<body>

  <div id="loginPage" class="loginPage">
    <div class="loginBox">
      <h2 class="title"><span class="hello">Hello,</span><br>Welcome to ECG Monitor</h2>
      <input id="name" placeholder="Name">
      <input id="phone" placeholder="Phone Number">
      <button onclick="loginUser()">Register now</button>
    </div>
  </div>

  <div id="menuPage" style="display:none" class="menuPage">
    <div class="menubox">
      <button onclick="goMonitor()">Start Monitoring</button>
      <button onclick="goHistory()">Heart History</button>
      <button>About Heart Health</button>
    </div>
  </div>

  <div id="dashboard" style="display:none" class="monitorPage">
    <button class="backBtn" onclick="goMenu()">Back</button>
    <div class="monitorBox">
      <canvas id="rawChart"></canvas>
      <div id="monitorContainer">
        <div id="bpmBox">-- BPM</div>
        <div id="voltageBox">-- V</div>
        <div id="status">Waiting for signal...</div>
      </div>
    </div>
  </div>

  <div id="historyPage" style="display:none" class="monitorPage">
    <button class="backBtn" onclick="goMenuFromHistory()">Back</button>
    <div class="monitorBox">
      <h2 style="color:#cb6161; margin-top:20px;">Heart Rate History</h2>
      <canvas id="historyChart"></canvas>
      <div class="summaryBox">
        <div>
          <p style="margin:0; font-size: 14px;">Patient Name</p>
          <span id="histName" style="font-weight: bold; color: #2d78c4;">--</span>
        </div>
        <div>
          <p style="margin:0; font-size: 14px;">Average BPM</p>
          <span id="avgBpm" style="font-weight: bold; color: #ff4d4d;">--</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "ecg-708bf.firebaseapp.com",
      databaseURL: "https://ecg-708bf-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "ecg-708bf",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.loginUser = function () {
      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      if (name == "" || phone == "") { alert("กรุณากรอกข้อมูล"); return; }
      const id = Date.now();
      set(ref(db, "users/" + id), { name, phone, loginTime: new Date().toLocaleString() });
      set(ref(db, "ActiveUser"), { name, phone });
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("menuPage").style.display = "flex";
    }

    window.goMonitor = function () {
      document.getElementById("menuPage").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      startMonitor();
    }

    window.goMenu = function () {
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("menuPage").style.display = "flex";
    }

    window.goMenuFromHistory = function() {
      document.getElementById("historyPage").style.display = "none";
      document.getElementById("menuPage").style.display = "flex";
    };

    let rawData = [], labels = [], lastBpm = 0, rawChart;

    function startMonitor() {
      if (rawChart) rawChart.destroy();
      rawChart = new Chart(document.getElementById("rawChart"), {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label: 'ECG Signal',
            data: rawData,
            borderColor: "#469cc4", 
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.2,       // ปรับลดความโค้งลงเล็กน้อยเพื่อให้เส้นนิ่งขึ้น
            fill: true,          
            backgroundColor: "rgba(70, 156, 196, 0.2)", 
            spanGaps: true
          }]
        },
        options: {
          animation: false,
          responsive: true,
          scales: {
            x: { 
              display: true,     
              grid: { color: "rgba(0, 0, 0, 0.05)" },
              ticks: { display: false }
            },
            y: { 
              display: true,
              // แก้ไข: ล็อกสเกลหน้า Monitor ให้นิ่ง (ช่วง 1000 - 3000)
              min: 1000, 
              max: 3000, 
              grid: { color: "rgba(0, 0, 0, 0.1)" },
              ticks: { color: "#888", font: { size: 10 } }
            }
          },
          plugins: { legend: { display: false } }
        }
      });

      onValue(ref(db, "ECG"), (snapshot) => {
        const data = snapshot.val();
        if (data) {
          labels.push("");
          rawData.push(data.raw);
          if (labels.length > 150) { labels.shift(); rawData.shift(); }
          rawChart.update('none');

          if (data.bpm !== undefined) {
            document.getElementById("bpmBox").innerHTML = data.bpm + " BPM";
            let status = data.bpm < 60 ? ["LOW", "orange"] : (data.bpm > 100 ? ["HIGH", "red"] : ["NORMAL", "green"]);
            document.getElementById("status").innerHTML = status[0];
            document.getElementById("status").style.color = status[1];
          }
          if (data.voltage !== undefined) {
            document.getElementById("voltageBox").innerHTML = data.voltage.toFixed(2) + " V";
          }
        }
      });
    }

    let historyChart;
    window.goHistory = function() {
      document.getElementById("menuPage").style.display = "none";
      document.getElementById("historyPage").style.display = "flex";
      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      document.getElementById("histName").innerHTML = name;
      loadHistory(phone);
    };

    function loadHistory(phone) {
      onValue(ref(db, "History/" + phone), (snapshot) => {
        const data = snapshot.val();
        if (data) {
          let hData = [], hLabels = [], sumBpm = 0, countBpm = 0;
          Object.values(data).forEach(item => {
            hData.push(item.val);
            hLabels.push("");
            if (item.bpm > 0) { sumBpm += item.bpm; countBpm++; }
          });
          document.getElementById("avgBpm").innerHTML = (countBpm > 0 ? Math.round(sumBpm / countBpm) : 0) + " BPM";

          if (historyChart) historyChart.destroy();
          historyChart = new Chart(document.getElementById("historyChart"), {
            type: 'line',
            data: {
              labels: hLabels,
              datasets: [{
                data: hData,
                borderColor: "#469cc4",
                borderWidth: 1.5,
                pointRadius: 0,
                tension: 0.1, // ปรับให้นิ่งที่สุดสำหรับการดูย้อนหลัง
                fill: true,
                backgroundColor: "rgba(70, 156, 196, 0.1)"
              }]
            },
            options: {
              responsive: true,
              scales: { 
                x: { display: false }, 
                y: { 
                  // แก้ไข: ล็อกสเกลหน้าประวัติให้นิ่งสนิท ไม่ให้ขยับขึ้นลงตามสัญญาณรบกวน
                  min: 1000, 
                  max: 3000, 
                  grid: { color: "rgba(0, 0, 0, 0.1)" },
                  ticks: { color: "#888", font: { size: 10 } }
                } 
              },
              plugins: { legend: { display: false } }
            }
          });
        } else {
          alert("ยังไม่มีประวัติบันทึกสำหรับเบอร์นี้");
          goMenuFromHistory();
        }
      });
    }
  </script>
</body>
</html>
